services:
  open-webui:
    # Custom image based on upstream OWUI with PDF-to-image conversion packages baked in.
    # Dockerfile is at docker/open-webui/Dockerfile. When upgrading versions,
    # align the Dockerfile FROM tag and the image tag below, then rebuild with:
    #   docker compose build --pull open-webui
    image: llens/open-webui:v0.9.5
    build:
      # Build context is the repo root because the Dockerfile needs to COPY
      # prompts/code-interpreter.md. Heavy directories are excluded via .dockerignore.
      context: .
      dockerfile: docker/open-webui/Dockerfile
    container_name: llens-open-webui
    environment:
      - WEBUI_NAME=LLENS
      - OPENAI_API_BASE_URL=http://host.docker.internal:8000/v1
      - OPENAI_API_KEY=EMPTY
      - ENABLE_OLLAMA_API=false
      - ENABLE_VERSION_UPDATE_CHECK=false
      - ENABLE_PERSISTENT_CONFIG=false
      - ENABLE_FOLLOW_UP_GENERATION=false
      - ENABLE_AUTOCOMPLETE_GENERATION=false
      - CONTENT_EXTRACTION_ENGINE=docling
      - DOCLING_SERVER_URL=http://docling:5001
      - 'DOCLING_PARAMS={"do_ocr": false}'
      - BYPASS_EMBEDDING_AND_RETRIEVAL=true
      - ENABLE_PIP_INSTALL_FRONTMATTER_REQUIREMENTS=false
      - ENABLE_EVALUATION_ARENA_MODELS=false
      - ENABLE_API_KEYS=true
      - 'DEFAULT_PROMPT_SUGGESTIONS=[{"title":["For new users","How to use LLENS"],"content":"This is my first time using LLENS. What can it do?"}]'
    volumes:
      - open-webui-data:/app/backend/data
    ports:
      # Access via Caddy (:80) or Cloudflare Tunnel during development
      - "127.0.0.1:8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - docling
    restart: unless-stopped

  docling:
    # CPU version. GPU version cannot be used because SGLang occupies all H200x8 GPUs.
    image: quay.io/docling-project/docling-serve:v1.17.0
    container_name: llens-docling
    ports:
      # Reachable from OWUI via docker network at docling:5001. Host-side is localhost only for debugging
      - "127.0.0.1:5001:5001"
    restart: unless-stopped

  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:4.5.2-4.8.1-distroless
    container_name: llens-dcgm-exporter
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
    ports:
      # Reachable from Prometheus via docker network at dcgm-exporter:9400. Host-side is for debugging only
      - "127.0.0.1:9400:9400"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  prometheus:
    image: prom/prometheus:v3.11.2
    container_name: llens-prometheus
    restart: unless-stopped
    ports:
      # Reachable from Grafana via docker network at prometheus:9090. Host-side is for debugging only
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    # 13.0.x patches are auto-tracked. Minor updates (13.1+) require manually bumping the tag.
    image: grafana/grafana:13.0
    container_name: llens-grafana
    restart: unless-stopped
    ports:
      # Accessible from the entire HINES network. GRAFANA_ADMIN_PASSWORD from .env is seeded when the volume is empty
      - "9000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in .env (see .env.example)}
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES=false
      - GF_NEWS_NEWS_FEED_ENABLED=false

volumes:
  open-webui-data:
  prometheus_data:
  grafana_data:
